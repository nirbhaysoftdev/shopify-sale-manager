version: '3.8'

services:

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: sale_manager_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: shopify_sale_manager
      MYSQL_USER: salemanager
      MYSQL_PASSWORD: salemanager123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sale_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: sale_manager_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sale_network

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sale_manager_backend
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - sale_network

  # Worker (BullMQ)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sale_manager_worker
    restart: always
    command: node jobs/worker.js
    env_file:
      - ./backend/.env
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - sale_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sale_manager_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - sale_network

networks:
  sale_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
