<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00a37e"/>
      <stop offset="100%" stop-color="#004c3f"/>
    </linearGradient>
    <linearGradient id="tagFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9efe9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="18" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.28"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- Subtle decorative ring (scheduling hint) -->
  <circle cx="600" cy="600" r="470" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="14"/>
  <circle cx="600" cy="600" r="420" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="6" stroke-dasharray="2 22"/>

  <!-- Price tag, rotated -->
  <g transform="rotate(-18 600 600)" filter="url(#shadow)">
    <!-- Tag body -->
    <path d="
        M 280 420
        L 760 420
        Q 820 420 820 480
        L 820 760
        Q 820 820 760 820
        L 480 820
        Q 440 820 412 792
        L 252 632
        Q 224 604 224 564
        L 224 480
        Q 224 420 280 420
        Z"
      fill="url(#tagFace)"/>

    <!-- Tag hole -->
    <circle cx="320" cy="500" r="42" fill="#004c3f"/>
    <circle cx="320" cy="500" r="18" fill="#ffffff"/>

    <!-- Percent symbol -->
    <g transform="translate(540 620)">
      <!-- diagonal stroke -->
      <rect x="-22" y="-160" width="44" height="320" rx="22" transform="rotate(28)" fill="#008060"/>
      <!-- top circle -->
      <circle cx="-95" cy="-90" r="58" fill="none" stroke="#008060" stroke-width="38"/>
      <!-- bottom circle -->
      <circle cx="95"  cy="90"  r="58" fill="none" stroke="#008060" stroke-width="38"/>
    </g>
  </g>

  <!-- Bottom-right small clock dial to hint scheduling -->
  <g transform="translate(940 940)">
    <circle r="90" fill="#ffffff" fill-opacity="0.96"/>
    <circle r="90" fill="none" stroke="#004c3f" stroke-opacity="0.15" stroke-width="6"/>
    <!-- 12 tick -->
    <rect x="-3" y="-78" width="6" height="14" rx="2" fill="#004c3f"/>
    <!-- 3 tick -->
    <rect x="64"  y="-3" width="14" height="6" rx="2" fill="#004c3f"/>
    <!-- 6 tick -->
    <rect x="-3" y="64" width="6" height="14" rx="2" fill="#004c3f"/>
    <!-- 9 tick -->
    <rect x="-78" y="-3" width="14" height="6" rx="2" fill="#004c3f"/>
    <!-- hour hand -->
    <rect x="-5" y="-44" width="10" height="48" rx="5" fill="#008060"/>
    <!-- minute hand -->
    <rect x="-4" y="-6"  width="62" height="8" rx="4" fill="#004c3f" transform="rotate(35)"/>
    <!-- pivot -->
    <circle r="9" fill="#004c3f"/>
  </g>
</svg>
